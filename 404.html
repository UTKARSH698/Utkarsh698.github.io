<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Utkarsh Batham</title>
<meta name="description" content="The page you requested could not be found. Head back to the homepage.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%2310141c'/><rect x='25' y='25' width='50' height='50' fill='%2334d399'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-DZ48W4D1EW"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-DZ48W4D1EW');</script>
<style>
  :root{
    --bg:oklch(0.16 0.012 260);--card:oklch(0.2 0.012 260);--bd:oklch(0.3 0.012 260);
    --fg:oklch(0.92 0.01 260);--fg2:oklch(0.74 0.01 260);--fg3:oklch(0.58 0.01 260);
    --green:oklch(0.78 0.13 150);--amber:oklch(0.8 0.13 85);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--fg);font-family:'IBM Plex Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px}
  .wrap{width:100%;max-width:680px;background:var(--card);border:1px solid var(--bd);border-radius:14px;overflow:hidden;box-shadow:0 30px 70px -30px rgba(0,0,0,.7)}
  .bar{height:42px;display:flex;align-items:center;gap:8px;padding:0 16px;background:oklch(0.21 0.012 260);border-bottom:1px solid var(--bd)}
  .dot{width:12px;height:12px;border-radius:50%}
  .body{padding:34px 30px}
  .code{font:700 12px 'IBM Plex Mono';letter-spacing:.3em;color:var(--amber);text-transform:uppercase}
  h1{font:600 40px/1.05 'Space Grotesk';color:var(--fg);margin:10px 0 14px}
  p{font:400 14.5px/1.6 'IBM Plex Mono';color:var(--fg2);max-width:52ch}
  .line{margin-top:22px;font:400 13.5px/1.7 'IBM Plex Mono';color:var(--fg3)}
  .line .g{color:var(--green)}
  a.home{display:inline-block;margin-top:24px;padding:10px 18px;border-radius:9px;border:1px solid var(--green);background:oklch(0.78 0.13 150 / .14);color:var(--green);font:600 13px 'IBM Plex Mono';text-decoration:none;transition:all .2s}
  a.home:hover{background:oklch(0.78 0.13 150 / .24)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="bar">
      <span class="dot" style="background:oklch(0.65 0.17 25)"></span>
      <span class="dot" style="background:oklch(0.78 0.15 85)"></span>
      <span class="dot" style="background:oklch(0.78 0.15 150)"></span>
      <span style="flex:1;text-align:center;font:500 12px 'IBM Plex Mono';color:var(--fg3)">utkarsh@cloud — zsh</span>
    </div>
    <div class="body">
      <span class="code">Error · 404</span>
      <h1>Page not found.</h1>
      <p>The route you requested doesn't resolve. Everything lives on the homepage now — one page, one shell.</p>
      <div class="line"><span class="g">&#10142; ~</span> cat <span id="bad-path">requested.path</span></div>
      <div class="line">cat: no such file or directory</div>
      <a class="home" href="/">&#10142; cd ~ &nbsp;·&nbsp; back to home</a>
    </div>
  </div>
  <script>
    var p = document.getElementById('bad-path');
    if (p) p.textContent = (location.pathname || '/').replace(/^\//,'') || 'requested.path';
  </script>
</body>
</html>
